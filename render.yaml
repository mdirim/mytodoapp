databases:
  - name: todoapp-db
    databaseName: todos
    user: todos_user
    plan: free
    region: oregon

services:
  - type: web
    name: mytodoapp
    runtime: dotnet
    plan: free
    region: oregon
    buildCommand: dotnet publish -c Release -o ./publish
    startCommand: dotnet publish -c Release -o ./publish && dotnet ./publish/MyTodoApp.dll
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: todoapp-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: ASPNETCORE_URLS
        value: http://+:10000
