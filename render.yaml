databases:
  - name: todoapp-db
    databaseName: todos
    user: todos_user
    plan: free
    region: oregon

services:
  - type: web
    name: mytodoapp
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Development
      - key: DATABASE_URL
        fromDatabase:
          name: todoapp-db
          property: connectionString
      - key: PORT
        value: "10000"
